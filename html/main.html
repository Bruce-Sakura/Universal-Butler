<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Home</title>
</head>
<body>
<h1>Hello <span id="username-placeholder"></span></h1> <!-- 添加了一个 span 标签来放置用户名 -->

<script>
    // 获取 Cookie 中的用户名
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    // 获取存储的用户名并替换占位符
    const username = getCookie('username');
    if (username) {
        const capitalizedUsername = username.charAt(0).toUpperCase() + username.slice(1);  // 首字母大写
        document.getElementById('username-placeholder').textContent = capitalizedUsername;  // 将首字母大写后的用户名放入 <span> 中
    } else {
        document.getElementById('username-placeholder').textContent = 'Guest';  // 如果没有用户名，显示 'Guest'
    }
</script>
</body>
</html>
